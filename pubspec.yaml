name: laundry_system
description: A comprehensive laundry management system with Flutter and Firebase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.0.0
  
  # UI/UX
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  
  # Image / Storage
  image_picker: ^1.0.7
  firebase_storage: ^11.6.0

  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/launcher_icon.png"
  min_sdk_android: 21
